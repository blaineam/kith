<svg width="660" height="400" viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.12" cy="0.10" r="0.6">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.90" cy="0.04" r="0.6">
      <stop offset="0" stop-color="#EC4899" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arrowg" gradientUnits="userSpaceOnUse" x1="250" y1="250" x2="412" y2="250">
      <stop offset="0" stop-color="#EC4899"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Backdrop -->
  <rect width="660" height="400" fill="#0b0b10"/>
  <rect width="660" height="400" fill="url(#glowL)"/>
  <rect width="660" height="400" fill="url(#glowR)"/>
  <!-- faint stars -->
  <g fill="#ffffff" opacity="0.16">
    <circle cx="70" cy="60" r="1.4"/><circle cx="120" cy="120" r="1"/><circle cx="560" cy="70" r="1.4"/>
    <circle cx="610" cy="150" r="1"/><circle cx="40" cy="300" r="1"/><circle cx="600" cy="320" r="1.3"/>
    <circle cx="330" cy="36" r="1"/>
  </g>

  <!-- Brand badge with the Haven network glyph -->
  <g transform="translate(330,66)">
    <rect x="-30" y="-30" width="60" height="60" rx="16" fill="url(#brand)"/>
    <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" fill="#ffffff" opacity="0.96">
      <!-- edges from center to 5 nodes -->
      <line x1="0" y1="0" x2="0" y2="-15"/>
      <line x1="0" y1="0" x2="14" y2="-4"/>
      <line x1="0" y1="0" x2="9" y2="13"/>
      <line x1="0" y1="0" x2="-9" y2="13"/>
      <line x1="0" y1="0" x2="-14" y2="-4"/>
      <circle cx="0" cy="0" r="4.4"/>
      <circle cx="0" cy="-15" r="3.2"/>
      <circle cx="14" cy="-4" r="3.2"/>
      <circle cx="9" cy="13" r="3.2"/>
      <circle cx="-9" cy="13" r="3.2"/>
      <circle cx="-14" cy="-4" r="3.2"/>
    </g>
  </g>

  <!-- Wordmark + instruction -->
  <text x="330" y="138" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="800" fill="url(#brand)" letter-spacing="0.5">Haven</text>
  <text x="330" y="166" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" fill="#f5f5f7" opacity="0.62">Drag Haven into Applications to install</text>

  <!-- Arrow from the app (left) toward Applications (right) -->
  <g opacity="0.9">
    <line x1="252" y1="250" x2="404" y2="250" stroke="url(#arrowg)" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M398 242 L412 250 L398 258" fill="none" stroke="url(#arrowg)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
