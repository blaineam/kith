name: android

# Build the Android APK so beta-testers always have a fresh sideloadable link.
#
# The app (android/) depends on the Rust core (`haven_ffi`) cross-compiled to a per-ABI
# .so via android/build-rust.sh (cargo-ndk) plus generated UniFFI Kotlin bindings. We build
# all four ABIs so the universal APK runs on every device + emulator.
#
# SIGNING: if the ANDROID_KEYSTORE_* secrets are present we decode the keystore and produce a
# release-signed APK; otherwise we fall back to a DEBUG-signed APK so betas build with ZERO setup.
# (android/app/build.gradle.kts `release {}` has no signingConfig, so an unsigned assembleRelease
# can't be installed — the debug fallback is what makes a no-secrets beta sideloadable.)
#
# Triggers: push to main (always-fresh link), workflow_dispatch, and `v*` tags (attached to the
# GitHub Release alongside the desktop installers from release.yml).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform + build-tools
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" "ndk;27.1.12297006"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.1.12297006" >> "$GITHUB_ENV"

      - name: Rust toolchain (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build Rust core (.so per ABI) + UniFFI Kotlin bindings
        env:
          ABIS: "arm64-v8a armeabi-v7a x86_64 x86"
        run: ./android/build-rust.sh

      - name: Decode release keystore (if configured)
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/haven-release.keystore"
            echo "have_keystore=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_keystore=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ANDROID_KEYSTORE_BASE64 secret — building a DEBUG-signed beta APK."
          fi

      - name: Build signed release APK
        if: steps.keystore.outputs.have_keystore == 'true'
        working-directory: android
        env:
          HAVEN_KEYSTORE_FILE: ${{ runner.temp }}/haven-release.keystore
          HAVEN_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HAVEN_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HAVEN_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug APK (beta fallback, no secrets)
        if: steps.keystore.outputs.have_keystore == 'false'
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p out
          find android/app/build/outputs/apk -name '*.apk' -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: haven-android-apk
          path: out/*.apk
          if-no-files-found: error

      - name: Attach APKs to the GitHub Release (on v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
          fail_on_unmatched_files: true
