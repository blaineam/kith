name: release

# One-tag, fully-automated release. Push a `v*` tag (e.g. `v0.1.0`) and this builds EVERYTHING
# and publishes it to a single GitHub Release:
#
#   • haven-relay static binary  → x86_64 / aarch64 / armv7 / armv6 (musl) + macOS arm64/x86_64
#     named `haven-relay-<target>` (exactly what relay/install.sh downloads) + .deb packages
#   • Desktop installers          → Windows .msi + NSIS .exe, Linux .deb/.rpm/AppImage
#   • SteamOS Flatpak bundle       → haven.flatpak (built from the freshly-built .deb)
#   • A version-pinned Flatpak manifest (com.blaineam.haven.yml) with the real .deb sha256,
#     so `flatpak-builder` against the release manifest Just Works.
#
# The tag drives the version: it's stamped into tauri.conf.json + the relay crate before build.
# Cut a release by tagging:  git tag v0.1.0 && git push origin v0.1.0
# (relay-only hotfix? use a `relay-v*` tag → relay-release.yml instead.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. v0.1.0 (dry-run: builds but only publishes on a tag)"
        required: false

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          ref="${{ github.event.inputs.version || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

  # ── Relay: static binary for every installer arch + macOS, plus .deb packages ───────────
  relay:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            deb: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            deb: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-musleabihf
            deb: true
          - os: ubuntu-latest
            target: arm-unknown-linux-musleabihf
            deb: false
          - os: macos-latest
            target: aarch64-apple-darwin
            deb: false
          - os: macos-latest
            target: x86_64-apple-darwin
            deb: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Stamp version
        run: |
          python3 - <<'PY'
          import re, pathlib
          v = "${{ needs.meta.outputs.version }}"
          p = pathlib.Path("core/haven-relay/Cargo.toml")
          t = p.read_text()
          t = re.sub(r'(?m)^version = ".*"', f'version = "{v}"', t, count=1)
          p.write_text(t)
          PY
      - name: Install zig (for cargo-zigbuild cross-compiles)
        if: runner.os == 'Linux'
        run: |
          ZIG_VER=0.13.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p /tmp/zig && tar -xJf /tmp/zig.tar.xz -C /tmp/zig --strip-components=1
          echo "/tmp/zig" >> "$GITHUB_PATH"
      - name: Install cargo-zigbuild + cargo-deb
        if: runner.os == 'Linux'
        run: cargo install cargo-zigbuild cargo-deb --locked
      - name: Build (Linux, musl)
        if: runner.os == 'Linux'
        working-directory: core
        run: cargo zigbuild --release -p haven-relay --target ${{ matrix.target }}
      - name: Build (macOS)
        if: runner.os == 'macOS'
        working-directory: core
        run: cargo build --release -p haven-relay --target ${{ matrix.target }}
      - name: Stage assets
        shell: bash
        run: |
          mkdir -p dist
          cp "core/target/${{ matrix.target }}/release/haven-relay" "dist/haven-relay-${{ matrix.target }}"
      - name: Build .deb
        if: matrix.deb
        # --no-strip: the host x86_64 `strip` can't strip a cross-built arm binary.
        # continue-on-error: a .deb hiccup must never block the (critical) binary + publish.
        continue-on-error: true
        working-directory: core
        run: cargo deb -p haven-relay --no-build --no-strip --target ${{ matrix.target }} --output ../dist/
      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ── Relay: Windows .exe (x86-64 + Arm64) ────────────────────────────────────────────────
  relay-windows:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Stamp version
        shell: bash
        run: |
          python -c "import re,pathlib; p=pathlib.Path('core/haven-relay/Cargo.toml'); t=p.read_text(); p.write_text(re.sub(r'(?m)^version = \".*\"','version = \"${{ needs.meta.outputs.version }}\"',t,count=1))"
      - name: Build haven-relay (${{ matrix.target }})
        working-directory: core
        run: cargo build --release -p haven-relay --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "core/target/${{ matrix.target }}/release/haven-relay.exe" "dist/haven-relay-${{ matrix.target }}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ── Desktop installers (Windows + Linux) ───────────────────────────────────────────────
  desktop:
    needs: meta
    # Partner Center / Microsoft Store credentials, surfaced as job env so the MSIX steps' `if:`
    # gates can test them. All blank until you add the secrets → the Store steps stay inert and
    # normal releases (installers only) are unaffected. See docs/STORE-AUTOPUBLISH.md.
    env:
      STORE_IDENTITY_NAME: ${{ secrets.STORE_IDENTITY_NAME }}
      STORE_PUBLISHER: ${{ secrets.STORE_PUBLISHER }}
      STORE_PUBLISHER_DISPLAY: ${{ secrets.STORE_PUBLISHER_DISPLAY }}
      STORE_TENANT_ID: ${{ secrets.STORE_TENANT_ID }}
      STORE_CLIENT_ID: ${{ secrets.STORE_CLIENT_ID }}
      STORE_CLIENT_SECRET: ${{ secrets.STORE_CLIENT_SECRET }}
      STORE_SELLER_ID: ${{ secrets.STORE_SELLER_ID }}
      STORE_APP_ID: ${{ secrets.STORE_APP_ID }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf file
      - name: Stamp version
        shell: bash
        run: |
          node -e "const f='desktop/src-tauri/tauri.conf.json';const c=require('fs');const j=JSON.parse(c.readFileSync(f));j.version='${{ needs.meta.outputs.version }}'.split('-')[0];c.writeFileSync(f,JSON.stringify(j,null,2));"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build
        working-directory: desktop/src-tauri
        run: cargo tauri build
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p out
          find desktop/src-tauri/target/release/bundle -type f \
            \( -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
            -exec cp {} out/ \;
          ls -la out

      # ── Microsoft Store: package an MSIX and submit it (Windows · tags · only when the Store
      #    secrets are set). Inert otherwise, so installer-only releases are untouched. The MSIX is
      #    also dropped in out/ so it rides the GitHub Release as a sideloadable download.
      - name: Package MSIX
        id: msix
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v') && env.STORE_IDENTITY_NAME != ''
        shell: pwsh
        run: |
          $ver  = "${{ needs.meta.outputs.version }}".Split('-')[0]
          $ver4 = "$ver.0"
          $stage = "$env:RUNNER_TEMP\msix"
          New-Item -ItemType Directory -Force -Path "$stage\Assets" | Out-Null
          $rel = "desktop\src-tauri\target\release"
          $exe = if (Test-Path "$rel\Haven.exe") { "$rel\Haven.exe" } else { "$rel\haven-desktop.exe" }
          Copy-Item $exe "$stage\Haven.exe"
          foreach ($a in 'StoreLogo','Square150x150Logo','Square44x44Logo','Square71x71Logo','Square310x310Logo') {
            Copy-Item "desktop\src-tauri\icons\$a.png" "$stage\Assets\$a.png"
          }
          $m = Get-Content "desktop\msix\AppxManifest.xml.in" -Raw
          $m = $m.Replace('@IDENTITY_NAME@',    $env:STORE_IDENTITY_NAME).
                  Replace('@PUBLISHER@',        $env:STORE_PUBLISHER).
                  Replace('@PUBLISHER_DISPLAY@',$env:STORE_PUBLISHER_DISPLAY).
                  Replace('@VERSION@',          $ver4)
          Set-Content "$stage\AppxManifest.xml" $m -Encoding UTF8
          $makeappx = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                       Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $makeappx) { throw "makeappx.exe not found in the Windows SDK" }
          $msix = "out\Haven-$ver.msix"
          & $makeappx pack /d "$stage" /p "$msix" /o
          "msix=$msix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Submit MSIX to the Microsoft Store
        if: steps.msix.outputs.msix != '' && env.STORE_TENANT_ID != ''
        shell: pwsh
        run: |
          dotnet tool install --global MSStore.CLI
          msstore reconfigure --tenantId $env:STORE_TENANT_ID --clientId $env:STORE_CLIENT_ID `
            --clientSecret $env:STORE_CLIENT_SECRET --sellerId $env:STORE_SELLER_ID
          msstore publish "${{ steps.msix.outputs.msix }}" --appId $env:STORE_APP_ID --noConfirm

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: out/*
          if-no-files-found: error

  # ── macOS: the NATIVE SwiftUI app (HavenMac), Developer ID signed + notarized .dmg ──────
  # NOT the Tauri build. This is a direct-download counterpart to the App Store build that
  # `rocket` ships. Uses the Developer ID cert (APPLE_CERTIFICATE) + notarytool (APPLE_ID /
  # APPLE_PASSWORD / APPLE_TEAM_ID). Uses the developer-id entitlements (no push/keychain-group)
  # so no provisioning profile is needed.
  macos-app:
    needs: meta
    runs-on: macos-latest
    continue-on-error: true   # a signing/notarization hiccup must never block Win/Linux/relay
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build HavenFFI.xcframework (Rust core → Swift)
        working-directory: apple
        run: ./build-rust-xcframework.sh
      - name: Generate Xcode project
        working-directory: apple
        run: xcodegen generate
      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/haven-signing.keychain-db"
          KCPW="$(openssl rand -hex 20)"
          CERT="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          security import "$CERT" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KC" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          echo "── Code-signing identities (must include a 'Developer ID Application'): ──"
          security find-identity -v -p codesigning "$KC"
      - name: Archive · export · dmg · notarize HavenMac
        working-directory: apple
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          ARCHIVE="$RUNNER_TEMP/HavenMac.xcarchive"
          # Manual Developer ID signing with the direct-download entitlements (no profile needed).
          xcodebuild -project Haven.xcodeproj -scheme HavenMac \
            -configuration Release -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_ENTITLEMENTS=HavenApp/Haven.macOS.developerid.entitlements \
            archive
          cat > "$RUNNER_TEMP/export.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$ARCHIVE" \
            -exportOptionsPlist "$RUNNER_TEMP/export.plist" \
            -exportPath "$RUNNER_TEMP/export"
          APP="$(/usr/bin/find "$RUNNER_TEMP/export" -maxdepth 1 -name '*.app' | head -1)"
          echo "exported app: $APP"
          # Build a STYLED drag-to-Applications .dmg with dmgbuild (brand background + icon layout,
          # parity with Blip / Enter Space Helper). dmgbuild writes the volume's .DS_Store directly,
          # so the styling actually applies on a headless CI runner — a Finder AppleScript silently
          # no-ops there, which is why earlier releases shipped an unstyled dmg. Verified locally.
          mkdir -p "$RUNNER_TEMP/out"
          DMG="$RUNNER_TEMP/out/Haven-${VERSION}-macOS.dmg"
          python3 -m venv "$RUNNER_TEMP/dmgvenv"
          "$RUNNER_TEMP/dmgvenv/bin/pip" install --quiet dmgbuild
          "$RUNNER_TEMP/dmgvenv/bin/dmgbuild" -s Scripts/dmg_settings.py \
            -D app="$APP" -D bg="$PWD/Scripts/dmg-background.png" \
            "Haven" "$DMG"
          # Notarize the dmg (notarizes the app inside) + staple the ticket.
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ${{ runner.temp }}/out/*
          if-no-files-found: error

  # ── SteamOS / Steam Deck Flatpak (built from the Linux .deb) ────────────────────────────
  flatpak:
    needs: desktop
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux
          path: linux-build
      - name: Point the manifest at the local .deb
        run: |
          deb=$(find linux-build -name '*.deb' | head -n1)
          cp "$deb" desktop/flatpak/haven.deb
          python3 - <<'PY'
          import re, pathlib
          m = pathlib.Path("desktop/flatpak/com.blaineam.haven.yml")
          t = m.read_text()
          t = re.sub(
              r"      - type: file\n        # CI uploads.*?\n        url:.*?\n        sha256:.*?\n        dest-filename: haven\.deb",
              "      - type: file\n        path: haven.deb",
              t, flags=re.S)
          m.write_text(t)
          PY
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: haven.flatpak
          manifest-path: desktop/flatpak/com.blaineam.haven.yml
          cache-key: flatpak-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: haven.flatpak
          if-no-files-found: error

  # ── Publish one Release with every artifact + a version-pinned Flatpak manifest ─────────
  publish:
    needs: [meta, relay, relay-windows, desktop, macos-app, flatpak]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Pin the Flatpak manifest to the released .deb
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import re, hashlib, glob, os, pathlib
          tag, repo = os.environ["TAG"], os.environ["REPO"]
          debs = glob.glob("dist/Haven_*amd64*.deb") or glob.glob("dist/haven_*amd64*.deb")
          if debs:
              deb = debs[0]; name = os.path.basename(deb)
              sha = hashlib.sha256(open(deb, "rb").read()).hexdigest()
              url = f"https://github.com/{repo}/releases/download/{tag}/{name}"
              t = pathlib.Path("desktop/flatpak/com.blaineam.haven.yml").read_text()
              t = re.sub(r"        url:.*", f"        url: {url}", t, count=1)
              t = re.sub(r"        sha256:.*", f"        sha256: {sha}", t, count=1)
              pathlib.Path("dist/com.blaineam.haven.yml").write_text(t)
              print("pinned", name, sha)
          else:
              print("no desktop .deb found; skipping manifest pin")
          PY
      - name: Generate release notes
        run: |
          cat > NOTES.md <<EOF
          Haven ${{ needs.meta.outputs.version }}

          **macOS** — the native SwiftUI app, Developer ID signed + notarized (\`Haven-*-macOS.dmg\`).
          **Desktop GUI** — Windows (.msi / NSIS .exe) · Linux (.deb / .rpm / AppImage) ·
          SteamOS / Steam Deck (\`haven.flatpak\` + the pinned \`com.blaineam.haven.yml\`).
          **Android** — sideloadable .apk (universal + per-ABI), attached by the \`android\` workflow.
          **Relay daemon** (\`haven-relay-<target>\`) — x86_64 / aarch64 / armv7 / armv6 (every
          Raspberry Pi) + macOS, plus .deb packages. Installed by \`relay/install.sh\`.

          See [docs/LINUX.md](https://github.com/${{ github.repository }}/blob/main/docs/LINUX.md)
          for per-distro install instructions.
          EOF
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: NOTES.md
          fail_on_unmatched_files: true
