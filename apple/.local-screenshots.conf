# Haven — App Store / portfolio screenshots config (sourced by
# ../../_shared/update-screenshots.sh, run from this apple/ directory).
#
# Haven is a P2P, end-to-end-encrypted social app (iOS + iPadOS, plus macOS via Mac
# Catalyst). Every screenshot comes from the app's gated, PII-FREE demo mode — a cast
# of fictional people with generated gradient "photos" and deterministic throwaway
# keys (HavenApp/DemoSeed.swift). No real contacts, circles, posts, stories, or DMs
# are ever read or written. See Tools/capture_screenshots.sh.

CAPTURE_CMD="./Tools/capture_screenshots.sh"   # writes raw PNGs per device key (iphone + ipad)
SCREENSHOTS_DIR="screenshots"
BUNDLE_ID="com.blaineam.kith"                  # the only id that stayed "kith" after the rename

# The Apple project is XcodeGen-generated and this checkout is FileProvider-tagged, so
# stray "Haven N.xcodeproj" duplicates appear next to it. Pin the canonical one so the
# pipeline never picks a duplicate (which sorts before "Haven.xcodeproj").
PROJECT_PATH="$(pwd)/Haven.xcodeproj"

# One entry per device: "<rawKey>|<.monkr path>|<ASC display type>"
#
# capture_screenshots.sh (no arg == all) captures iPhone + iPad. The scenes, in App
# Store display order: 01 feed · 02 stories · 03 DM thread · 04 group call · 05 you ·
# 06 identity · 07 messages list.
#
# NOTE: monkr paths are resolved relative to THIS directory (apple/, where the pipeline
# runs), but Haven keeps its docs at the repo root — hence the ../docs prefix.
#
# macOS (Mac Catalyst) is OPT-IN: it needs an UNLOCKED + AWAKE display with Screen
# Recording permission, so it is NOT part of `all`. To add the Mac listing, run
#   ./Tools/capture_screenshots.sh mac
# first (writes screenshots/mac/…), create ../docs/appstore-screenshots/Haven-mac.monkr,
# then uncomment the MAC_OS line below and re-run update-screenshots.sh.
DEVICES=(
  "iphone-6.9|../docs/appstore-screenshots/Haven-iphone.monkr|APP_IPHONE_67"
  "ipad-13|../docs/appstore-screenshots/Haven-ipad.monkr|APP_IPAD_PRO_3GEN_129"
  # "mac|../docs/appstore-screenshots/Haven-mac.monkr|APP_DESKTOP"   # PLATFORM=MAC_OS — see note above
)
