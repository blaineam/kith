name: Haven
options:
  bundleIdPrefix: com.blaineam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # Prebuilt WebRTC binary (libwebrtc) for reliable E2EE audio/video calls. Signaling rides
  # Haven's own sealed channel; media is DTLS-SRTP peer-to-peer.
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "120.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8ZVSPZYSVF"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  # iOS/iPadOS app. macOS now ships from the native `HavenMac` target (Mac Catalyst dropped
  # 2026-06-23 — see docs/MACOS-NATIVE-PORT.md Phase 4).
  Haven:
    type: application
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: HavenApp
      - path: Shared
      - path: Generated/haven_ffi.swift
    dependencies:
      - framework: HavenFFI.xcframework
        embed: false
      # iroh's network-discovery deps (netdev, hickory DNS, system_configuration)
      # reference SCDynamicStore* — link SystemConfiguration.
      - sdk: SystemConfiguration.framework
      # Embed the Notification Service Extension so blind push payloads decrypt on-device.
      - target: HavenNotificationService
      # ReplayKit broadcast upload extension (iOS screen sharing in calls). App Group
      # group.com.blaineam.kith pipes screen frames to the app.
      - target: HavenBroadcast
        platformFilter: iOS
      # WebRTC for E2EE audio/video calls (media is P2P DTLS-SRTP; signaling over our channel).
      - package: WebRTC
    info:
      path: HavenApp/Info.plist
      properties:
        CFBundleDisplayName: Haven
        # Track the build settings (a managed Info.plist won't do this automatically).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        # Required by the Mac App Store (ignored on iOS). Haven is a social network.
        LSApplicationCategoryType: public.app-category.social-networking
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Haven uses the camera so you can capture photos and videos to share with your circle. Nothing is uploaded — media is encrypted on your device first."
        NSMicrophoneUsageDescription: "Haven uses the microphone to record sound with your videos."
        NSPhotoLibraryUsageDescription: "Haven lets you pick photos and videos from your library to share privately with your circle."
        NSPhotoLibraryAddUsageDescription: "Haven can save photos and videos you share or receive to your Photos library, so they're ready when you open Photos."
        NSAppleMusicUsageDescription: "Haven lets you add a song to a post; it plays through your own Apple Music."
        NSLocalNetworkUsageDescription: "Haven finds people in your circle who are nearby so it can share posts directly over Wi-Fi and Bluetooth — even with no internet."
        NSBluetoothAlwaysUsageDescription: "Haven uses Bluetooth to share posts directly with nearby people in your circle when you're offline."
        NSLocationWhenInUseUsageDescription: "Haven uses your location only when you choose to pin and share a spot on a map with your circle. It's never tracked or uploaded otherwise."
        NSFaceIDUsageDescription: "Haven uses Face ID to unlock circles you've chosen to lock, so only you can open them."
        NSBonjourServices:
          - _haven-circle._tcp
          - _haven-circle._udp
        # EAR-exempt (standard mass-market crypto, not shipped to France) → NO. The app
        # still has full E2E post-quantum encryption; this is only the US export answer.
        ITSAppUsesNonExemptEncryption: false
        # Invite deep links: haven://u/<id>#<verify>.
        CFBundleURLTypes:
          - CFBundleURLName: com.blaineam.kith
            CFBundleURLSchemes: [haven]
        # Local notifications only — no push server. A background-refresh wake briefly
        # brings up P2P networking, syncs, and posts LOCAL notifications for anything new.
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
          - voip
        BGTaskSchedulerPermittedIdentifiers:
          - com.blaineam.kith.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "80"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        # macOS ships from the native HavenMac target — don't ALSO offer this iOS app on Mac
        # ("Designed for iPad"), which would clash with HavenMac's bundle id on App Store Connect.
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        # Device/QA-loop (Debug) builds get a sandbox APNs token; archives ship production.
        # Matches PushManager.isSandbox (#if DEBUG) and the dev vs distribution profiles.
        Debug:
          CODE_SIGN_ENTITLEMENTS: HavenApp/Haven.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: HavenApp/Haven.entitlements

  # Native macOS (AppKit-backed SwiftUI) app — THE macOS build (Mac Catalyst dropped 2026-06-23).
  # Shares the exact same HavenApp / Shared / Generated sources; the platform differences live
  # behind `#if os(macOS)` and the shims in Platform.swift. No NSE/Broadcast app-extensions here
  # (those are iOS-only; macOS notifications/screen-share use the in-process desktop paths).
  # Some platform views (camera/in-call video/Apple Music/screen share) are placeholders pending
  # the Phase-2 native-view backfill — see docs/MACOS-NATIVE-PORT.md.
  HavenMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: HavenApp
      - path: Shared
      - path: Generated/haven_ffi.swift
    dependencies:
      - framework: HavenFFI.xcframework
        embed: false
      - sdk: SystemConfiguration.framework
      - package: WebRTC
    info:
      path: HavenApp/Info.macOS.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.social-networking
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Haven uses the camera so you can capture photos and videos to share with your circle. Nothing is uploaded — media is encrypted on your device first."
        NSMicrophoneUsageDescription: "Haven uses the microphone to record sound with your videos."
        NSPhotoLibraryUsageDescription: "Haven lets you pick photos and videos from your library to share privately with your circle."
        NSPhotoLibraryAddUsageDescription: "Haven can save photos and videos you share or receive to your Photos library, so they're ready when you open Photos."
        NSAppleMusicUsageDescription: "Haven lets you add a song to a post; it plays through your own Apple Music."
        NSLocalNetworkUsageDescription: "Haven finds people in your circle who are nearby so it can share posts directly over Wi-Fi and Bluetooth — even with no internet."
        NSBluetoothAlwaysUsageDescription: "Haven uses Bluetooth to share posts directly with nearby people in your circle when you're offline."
        NSLocationWhenInUseUsageDescription: "Haven uses your location only when you choose to pin and share a spot on a map with your circle. It's never tracked or uploaded otherwise."
        NSFaceIDUsageDescription: "Haven uses Touch ID to unlock circles you've chosen to lock, so only you can open them."
        NSBonjourServices:
          - _haven-circle._tcp
          - _haven-circle._udp
        CFBundleURLTypes:
          - CFBundleURLName: com.blaineam.kith
            CFBundleURLSchemes: [haven]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        PRODUCT_NAME: Haven
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "80"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: HavenApp/Haven.macOS.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: HavenApp/Haven.macOS.entitlements

  HavenNotificationService:
    type: app-extension
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: HavenNotificationService
      - path: Shared
      - path: Generated/haven_ffi.swift
    dependencies:
      - framework: HavenFFI.xcframework
        embed: false
      # The static Rust core (UniFFI scaffolding references the networking node) pulls in
      # iroh/netdev symbols: SCDynamicStore* (SystemConfiguration) + nw_path_monitor_*
      # (Network). The app gets Network transitively; the bare extension must link it itself.
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
    info:
      path: HavenNotificationService/Info.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.NotificationService
        PRODUCT_MODULE_NAME: HavenNotificationService
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "80"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        CODE_SIGN_ENTITLEMENTS: HavenNotificationService/NSE.entitlements
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO

  # ReplayKit broadcast upload extension: captures the whole screen on iOS and pipes frames to the
  # app through the shared App Group. iOS-only.
  HavenBroadcast:
    type: app-extension
    platform: iOS
    supportedDestinations: [iOS]
    sources:
      - path: HavenBroadcast
      - path: Shared/BroadcastIPC.swift
    info:
      path: HavenBroadcast/Info.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.Broadcast
        PRODUCT_MODULE_NAME: HavenBroadcast
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "80"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        CODE_SIGN_ENTITLEMENTS: HavenBroadcast/Broadcast.entitlements
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

  HavenUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HavenUITests
    dependencies:
      - target: Haven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.uitests
        GENERATE_INFOPLIST_FILE: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        TEST_TARGET_NAME: Haven

schemes:
  Haven:
    build:
      targets:
        Haven: all
        HavenUITests: [test]
    test:
      targets:
        - HavenUITests
  HavenMac:
    build:
      targets:
        HavenMac: all
