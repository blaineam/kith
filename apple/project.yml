name: Kith
options:
  bundleIdPrefix: com.blaineam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8ZVSPZYSVF"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Kith:
    type: application
    platform: iOS
    sources:
      - path: KithApp
      - path: Generated/kith_ffi.swift
    dependencies:
      - framework: KithFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kith
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

  KithUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KithUITests
    dependencies:
      - target: Kith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.uitests
        GENERATE_INFOPLIST_FILE: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        TEST_TARGET_NAME: Kith

schemes:
  Kith:
    build:
      targets:
        Kith: all
        KithUITests: [test]
    test:
      targets:
        - KithUITests
