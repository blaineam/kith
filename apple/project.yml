name: Kith
options:
  bundleIdPrefix: com.blaineam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8ZVSPZYSVF"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Kith:
    type: application
    platform: iOS
    sources:
      - path: KithApp
      - path: Generated/kith_ffi.swift
    dependencies:
      - framework: KithFFI.xcframework
        embed: false
      # iroh's network-discovery deps (netdev, hickory DNS, system_configuration)
      # reference SCDynamicStore* — link SystemConfiguration.
      - sdk: SystemConfiguration.framework
    info:
      path: KithApp/Info.plist
      properties:
        CFBundleDisplayName: Kith
        # Track the build settings (a managed Info.plist won't do this automatically).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Kith uses the camera so you can capture photos and videos to share with your circle. Nothing is uploaded — media is encrypted on your device first."
        NSMicrophoneUsageDescription: "Kith uses the microphone to record sound with your videos."
        NSPhotoLibraryUsageDescription: "Kith lets you pick photos and videos from your library to share privately with your circle."
        NSPhotoLibraryAddUsageDescription: "Kith can save photos and videos you share or receive to your Photos library, so they're ready when you open Photos."
        NSAppleMusicUsageDescription: "Kith lets you add a song to a post; it plays through your own Apple Music."
        NSLocalNetworkUsageDescription: "Kith finds people in your circle who are nearby so it can share posts directly over Wi-Fi and Bluetooth — even with no internet."
        NSBluetoothAlwaysUsageDescription: "Kith uses Bluetooth to share posts directly with nearby people in your circle when you're offline."
        NSBonjourServices:
          - _kith-circle._tcp
          - _kith-circle._udp
        # EAR-exempt (standard mass-market crypto, not shipped to France) → NO. The app
        # still has full E2E post-quantum encryption; this is only the US export answer.
        ITSAppUsesNonExemptEncryption: false
        # Deep link for invite links: kith://u/<id>#<verify> (from wemiller.com/apps/kith).
        CFBundleURLTypes:
          - CFBundleURLName: com.blaineam.kith
            CFBundleURLSchemes: [kith]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "22"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

  KithUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KithUITests
    dependencies:
      - target: Kith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.uitests
        GENERATE_INFOPLIST_FILE: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        TEST_TARGET_NAME: Kith

schemes:
  Kith:
    build:
      targets:
        Kith: all
        KithUITests: [test]
    test:
      targets:
        - KithUITests
