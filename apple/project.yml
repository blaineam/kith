name: Kith
options:
  bundleIdPrefix: com.blaineam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8ZVSPZYSVF"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Kith:
    type: application
    platform: iOS
    supportedDestinations: [iOS, macCatalyst]
    sources:
      - path: KithApp
      - path: Generated/haven_ffi.swift
    dependencies:
      - framework: HavenFFI.xcframework
        embed: false
      # iroh's network-discovery deps (netdev, hickory DNS, system_configuration)
      # reference SCDynamicStore* — link SystemConfiguration.
      - sdk: SystemConfiguration.framework
    info:
      path: KithApp/Info.plist
      properties:
        CFBundleDisplayName: Haven
        # Track the build settings (a managed Info.plist won't do this automatically).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Haven uses the camera so you can capture photos and videos to share with your circle. Nothing is uploaded — media is encrypted on your device first."
        NSMicrophoneUsageDescription: "Haven uses the microphone to record sound with your videos."
        NSPhotoLibraryUsageDescription: "Haven lets you pick photos and videos from your library to share privately with your circle."
        NSPhotoLibraryAddUsageDescription: "Haven can save photos and videos you share or receive to your Photos library, so they're ready when you open Photos."
        NSAppleMusicUsageDescription: "Haven lets you add a song to a post; it plays through your own Apple Music."
        NSLocalNetworkUsageDescription: "Haven finds people in your circle who are nearby so it can share posts directly over Wi-Fi and Bluetooth — even with no internet."
        NSBluetoothAlwaysUsageDescription: "Haven uses Bluetooth to share posts directly with nearby people in your circle when you're offline."
        NSBonjourServices:
          - _haven-circle._tcp
          - _haven-circle._udp
        # EAR-exempt (standard mass-market crypto, not shipped to France) → NO. The app
        # still has full E2E post-quantum encryption; this is only the US export answer.
        ITSAppUsesNonExemptEncryption: false
        # Invite deep links: haven://u/<id>#<verify> (kith:// kept for older links).
        CFBundleURLTypes:
          - CFBundleURLName: com.blaineam.kith
            CFBundleURLSchemes: [haven, kith]
        # Local notifications only — no push server. A background-refresh wake briefly
        # brings up P2P networking, syncs, and posts LOCAL notifications for anything new.
        UIBackgroundModes:
          - fetch
          - processing
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - com.blaineam.kith.refresh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: KithApp/Kith.entitlements
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "43"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        # Mac Catalyst: the same SwiftUI app runs on macOS (Apple Silicon).
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        "EXCLUDED_ARCHS[sdk=macosx*]": x86_64

  KithUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KithUITests
    dependencies:
      - target: Kith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.uitests
        GENERATE_INFOPLIST_FILE: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        TEST_TARGET_NAME: Kith

schemes:
  Kith:
    build:
      targets:
        Kith: all
        KithUITests: [test]
    test:
      targets:
        - KithUITests
