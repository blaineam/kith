name: Kith
options:
  bundleIdPrefix: com.blaineam
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "8ZVSPZYSVF"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Kith:
    type: application
    platform: iOS
    sources:
      - path: KithApp
      - path: Generated/kith_ffi.swift
    dependencies:
      - framework: KithFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Kith
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "Kith uses the camera so you can capture photos and videos to share with your circle. Nothing is uploaded — media is encrypted on your device first."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Kith uses the microphone to record sound with your videos."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Kith lets you pick photos and videos from your library to share privately with your circle."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Kith can save photos and videos you share or receive to your Photos library, so they're ready when you open Photos."
        INFOPLIST_KEY_NSAppleMusicUsageDescription: "Kith lets you add a song to a post; it plays through your own Apple Music."
        # Kith uses real E2E post-quantum encryption → non-exempt. This is the honest
        # declaration; US compliance is automated (Scripts/export-compliance.mjs) and
        # it does NOT restrict global App Store distribution.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "YES"
        # Predefine compliance once you've completed the App Encryption Declaration in
        # App Store Connect once: Apple issues a compliance code — paste it here and
        # uncomment to skip the export-compliance prompt on every future build.
        # INFOPLIST_KEY_ITSEncryptionExportComplianceCode: "PASTE-CODE-FROM-ASC"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "5"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

  KithUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KithUITests
    dependencies:
      - target: Kith
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.kith.uitests
        GENERATE_INFOPLIST_FILE: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
        TEST_TARGET_NAME: Kith

schemes:
  Kith:
    build:
      targets:
        Kith: all
        KithUITests: [test]
    test:
      targets:
        - KithUITests
